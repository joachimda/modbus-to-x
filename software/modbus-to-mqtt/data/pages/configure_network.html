<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Configure Network | Modbus To X</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="../style.css">
    <script type="importmap">
        {
          "imports": {
            "app": "/js/app.js",
            "configure_network": "/js/pages/configure_network.js"
          }
        }
    </script>
    <style>
        .danger-zone { border: 1px solid var(--danger, #c0392b); padding: 1rem; border-radius: 6px; }
        .danger-zone h2 { margin-top: 0; }
    </style>
</head>
<body data-page="configure_network">
<header style="display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;">
    <div>
        <h1>Network Settings</h1>
    </div>
    <nav class="toolbar">
        <button class="theme-toggle" id="btn-theme" aria-label="Toggle dark mode" title="Toggle dark mode">
            <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>
        <button class="gearButton rebootButton" id="btn-reboot" aria-label="Reboot device" title="Reboot device">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <polyline points="23 4 23 10 17 10"></polyline>
                <polyline points="1 20 1 14 7 14"></polyline>
                <path d="M3.51 9A9 9 0 0 1 17 5.34L23 10"></path>
                <path d="M20.49 15A9 9 0 0 1 7 18.66L1 14"></path>
            </svg>
        </button>
    </nav>
</header>
<main>
    <section class="card danger-zone">
        <h2>Wipe Wi-Fi credentials</h2>
        <p class="muted">
            Erases the stored SSID and password and reboots the device into AP mode for re-provisioning.
        </p>
        <button id="btn-wipe-network" class="btn ghost">Wipe Wi-Fi credentials</button>
    </section>
</main>
<script type="module">
    import 'app';
    import 'configure_network';
</script>
</body>
</html>
